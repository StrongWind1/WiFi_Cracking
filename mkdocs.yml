site_name: WiFi Cracking
site_description: Complete technical reference for IEEE 802.11 security — protocols, attacks, and hash extraction
site_url: https://strongwind1.github.io/WiFi_Cracking/
repo_url: https://github.com/StrongWind1/WiFi_Cracking
repo_name: StrongWind1/WiFi_Cracking
copyright: Copyright &copy; 2025 - 2026 StrongWind1

theme:
  name: material
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - toc.follow
    - search.highlight
    - search.suggest
    - search.share
    - header.autohide
    - content.code.copy
    - content.code.annotate

plugins:
  - search

exclude_docs: |
  includes/

markdown_extensions:
  - abbr
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.mark
  - pymdownx.keys
  - pymdownx.snippets:
      auto_append:
        - docs/includes/abbreviations.md
  - tables
  - attr_list
  - md_in_html
  - def_list
  - footnotes
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Protocol:
    - protocol/index.md
    - Security matrix: protocol/security-matrix.md
    - Key hierarchy: protocol/key-hierarchy.md
    - 4-way handshake: protocol/four-way-handshake.md
    - PSK (AKM 2, 6, 20): protocol/psk-family.md
    - FT-PSK (AKM 4, 19): protocol/ft-psk-family.md
    - SAE (AKM 8, 9, 24, 25): protocol/sae-family.md
    - Enterprise (AKM 1, 3, 5, 11-13, 22, 23): protocol/enterprise-family.md
    - FILS (AKM 14-17): protocol/fils-family.md
    - Other (OWE, TDLS, PASN): protocol/other-family.md
  - PSK Attacks:
    - psk-attacks/index.md
    - PMKID attack: psk-attacks/pmkid.md
    - EAPOL attack: psk-attacks/eapol.md
    - Algorithms: psk-attacks/algorithms.md
  - EAP Attacks:
    - eap-attacks/index.md
    - PEAP / MSCHAPv2: eap-attacks/peap-mschapv2.md
    - EAP-MD5: eap-attacks/eap-md5.md
    - Cisco LEAP: eap-attacks/leap.md
  - WEP:
    - wep/index.md
    - Aircrack-ng workflow: wep/aircrack-workflow.md
  - Tools:
    - tools/index.md
    - hcxpcapngtool: tools/hcxpcapngtool.md
    - hashcat: tools/hashcat.md
    - Aircrack-ng suite: tools/aircrack-suite.md
    - hostapd-mana: tools/hostapd-mana.md
  - Reference:
    - reference/index.md
    - EAPOL-Key frame: reference/eapol-frame.md
    - Capture requirements: reference/capture-requirements.md
    - Hash extraction reference: reference/hash-extraction.md
    - Gap table: reference/gap-table.md
    - Glossary: reference/glossary.md
  - Meta:
    - Contributing: meta/contributing.md
    - Changelog: meta/changelog.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/StrongWind1/WiFi_Cracking
      name: WiFi Cracking on GitHub
  generator: false

extra_css:
  - stylesheets/extra.css
